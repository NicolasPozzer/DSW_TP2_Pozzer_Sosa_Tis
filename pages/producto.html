<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detalle - Retro Games</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/main.css" />
</head>
<body>

  <!-- barra de navegacion -->
  <nav class="navbar navbar-retro navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="../index.html"><span class="brand-icon">👾</span> Retro Games</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav mx-auto gap-1">
          <li class="nav-item"><a class="nav-link active" href="tienda.html">Tienda</a></li>
        </ul>
        <div class="navbar-icons">
          <a class="nav-icon-btn" href="#"><i class="bi bi-box-arrow-in-right"></i></a>
          <button class="nav-icon-btn" id="openCartBtn">
            <i class="bi bi-cart3"></i>
            <span class="badge-cart" id="cartBadge">0</span>
          </button>
        </div>
      </div>
    </div>
  </nav>


  <!-- detalles del producto -->
  <section class="product-detail">
    <div class="container">
      <div id="productContent">
        <!-- Loaded by JS -->
      </div>

      <!-- RELATED GAMES -->
      <div class="mt-5">
        <h2 class="section-title">También te puede interesar</h2>
        <div class="games-grid" id="relatedGames"></div>
      </div>
    </div>
  </section>

  <!-- footer -->
  <footer class="footer-retro">
    <div class="container">
      <div class="footer-bottom">
        <span class="footer-copy">© 2025 <span>Retro Games</span>. Todos los derechos reservados.</span>
        <span>Hecho con 🎮 en Argentina</span>
      </div>
    </div>
  </footer>

  <!-- carrito en el sidebar -->
  <div class="cart-overlay" id="cartOverlay">
    <div class="cart-sidebar">
      <div class="cart-header">
        <div class="cart-title">
          <span class="brand-icon">👾</span>
          <i class="bi bi-cart3 cart-icon"></i> Carrito
        </div>
        <button class="cart-close" id="closeCartBtn">&times;</button>
      </div>
      <div class="cart-items" id="cartItems"></div>
      <div class="cart-footer" id="cartFooter" style="display:none">
        <div class="cart-subtotal">
          <span class="subtotal-label">Subtotal</span>
          <span class="subtotal-amount" id="cartSubtotal">$ 0,00</span>
        </div>
        <div class="cart-actions">
          <button class="btn-retro btn-retro-dark" onclick=""><i class="bi bi-arrow-left"></i> Comprar más</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-retro" id="toastMsg">
    <span class="toast-icon">✅</span>
    <span id="toastText">Producto agregado</span>
  </div>

  <script>
    let productCantidad = 1;
    let juegoActual = null;

    function addProductToCart() {

      if (!juegoActual || !juegoActual.stock) return;
      const existing = cart.find(i => i.id === juegoActual.id);

      if (existing) {
        existing.qty += productQty;

      } else {
        cart.push({ id: juegoActual.id, title: juegoActual.title, price: juegoActual.price, img: juegoActual.img, qty: productQty });
      }

    }

  </script>
</body>
</html>
