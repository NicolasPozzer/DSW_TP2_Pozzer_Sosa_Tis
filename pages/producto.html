<!-- detalles del producto -->

<!-- carrito -->
<div class="cart-overlay" id="cartOverlay">
  <div class="cart-sidebar">
    <div class="cart-header">

    <div class="cart-footer" id="cartFooter" style="display:none">

        <span class="subtotal-label">Subtotal</span>

      </div>

</div>

<div class="toast-retro" id="toastMsg">
  <span class="toast-icon">✅</span>
  <span id="toastText">Producto agregado</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/data.js"></script>
<script src="../js/cart.js"></script>
<script src="../js/main.js"></script>
<script>
  let productQty = 1;
  let currentGame = null;

  function renderStars(n) {
    return '★'.repeat(n) + '☆'.repeat(5 - n);
  }

  function mostrarProducto(game) {
    currentGame = game;
    document.title = `${game.title} - Retro Games`;
    document.getElementById('breadcrumbTitle').textContent = game.title;

    const stockHTML = game.stock
            ? '<span class="badge-stock"><i class="bi bi-check-circle-fill me-1"></i>En Stock</span>'
            : '<span class="badge-stock" style="background:rgba(230,57,70,.15);color:#e63946;border-color:rgba(230,57,70,.3);">Sin Stock</span>';

    document.getElementById('productContent').innerHTML = `
        <div class="row g-4 align-items-start">
          <div class="col-md-5 d-flex justify-content-center">
            <div class="product-img-wrap">
              <img src="${game.img}" alt="${game.title}" onerror="this.src='https://via.placeholder.com/420x300/1a1a2e/00b4d8?text=${encodeURIComponent(game.title)}'" />
            </div>
          </div>
          <div class="col-md-7">
            <div class="product-info">
              <h1 class="product-title">${game.title}</h1>
              <div class="product-studio">${game.studio}</div>
              <div class="product-authors">${game.authors.join(' · ')}</div>
              <div class="product-badges">
                ${stockHTML}
                <span class="badge-currency"><i class="bi bi-cash me-1"></i>Moneda: ${game.currency}</span>
                <span class="badge-currency" style="background:rgba(255,214,10,.08);color:#ffd60a;border-color:rgba(255,214,10,.3);">
                  <i class="bi bi-calendar3 me-1"></i>${game.year}
                </span>
              </div>
              <div class="product-price">$ ${formatPrice(game.price)},00</div>

              <div class="qty-control">
                <button class="qty-btn" onclick="changeProductQty(-1)">−</button>
                <div class="qty-display" id="qtyDisplay">1</div>
                <button class="qty-btn" onclick="changeProductQty(1)">+</button>
                <button class="btn-add-to-cart" onclick="agregarProductoAlCarrito()" ${!game.stock ? 'disabled style="opacity:.5;cursor:not-allowed"' : ''}>
                  <i class="bi bi-cart-plus me-1"></i> Añadir al Carrito
                </button>
              </div>

              <div class="product-tabs-nav">
                <button class="tab-btn active" onclick="showTab('desc', this)">Descripción</button>
              </div>
            </div>

            <div class="product-tab-content">
              <div class="tab-pane active" id="tab-desc">
                <p>${game.description}</p>
              </div>
              <div class="tab-pane" id="tab-reviews">
                ${game.reviews.map(r => `
                  <div style="padding:1rem 0; border-bottom:1px solid rgba(0,180,216,0.1);">
                    <div style="font-family:'Exo 2',sans-serif;font-weight:700;color:#fff;margin-bottom:0.25rem;">${r.user}</div>
                    <div style="color:#ffd60a;letter-spacing:2px;font-size:0.9rem;margin-bottom:0.5rem;">${renderStars(r.stars)}</div>
                    <p style="color:#c5c5c5;font-size:0.9rem;margin:0;">${r.text}</p>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>
        </div>
      `;
  }

  function changeProductQty(delta) {
    productQty = Math.max(1, productQty + delta);
    document.getElementById('qtyDisplay').textContent = productQty;
  }

  function agregarProductoAlCarrito() {
    if (!currentGame || !currentGame.stock) return;
    const existing = cart.find(i => i.id === currentGame.id);
    if (existing) {
      existing.qty += productQty;
    } else {
      cart.push({ id: currentGame.id, title: currentGame.title, price: currentGame.price, img: currentGame.img, qty: productQty });
    }
    saveCart();
    mostrarNotificacion(`"${currentGame.title}" × ${productQty} agregado al carrito`);
    abrirCarrito();
  }

  function showTab(tabId, btn) {
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`tab-${tabId}`).classList.add('active');
    btn.classList.add('active');
  }

  document.addEventListener('DOMContentLoaded', () => {
    const id = parseInt(getQueryParam('id'));
    const game = GAMES.find(g => g.id === id);

    if (!game) {
      document.getElementById('productContent').innerHTML = `
          <div style="text-align:center;padding:4rem;color:#888;font-family:'Exo 2',sans-serif;">
            <div style="font-size:3rem;margin-bottom:1rem;">🕹️</div>
            <h2>Juego no encontrado</h2>
            <a href="tienda.html" class="btn-retro btn-retro-primary mt-3">Ir a la Tienda</a>
          </div>`;
      return;
    }

    mostrarProducto(game);

    // Related games
    const related = GAMES.filter(g => g.id !== game.id && g.category === game.category).slice(0, 4);
    const fallback = GAMES.filter(g => g.id !== game.id).slice(0, 4);
    const toShow = related.length > 0 ? related : fallback;
    document.getElementById('relatedGames').innerHTML = toShow.map(g => irAlJuego2(g)).join('');
  });
</script>
</body>
</html>
