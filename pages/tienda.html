<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tienda - Retro Games</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/main.css" />
</head>
<body>

  <!-- barra de navegacion -->
  <nav class="navbar navbar-retro navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="../index.html">
        <span class="brand-icon">👾</span> Retro Games
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav mx-auto gap-1">
          <li class="nav-item"><a class="nav-link active" href="tienda.html">Tienda</a></li>
        </ul>
        <div class="navbar-icons">
          <a class="nav-icon-btn" href="#"><i class="bi bi-box-arrow-in-right"></i></a>
          <button class="nav-icon-btn" id="openCartBtn">
            <i class="bi bi-cart3"></i>
            <span class="badge-cart" id="cartBadge">0</span>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- header -->
  <div style="background: linear-gradient(135deg, #1a1a2e 0%, #0d0d0d 100%); padding: 2.5rem 0; border-bottom: 1px solid rgba(0,180,216,0.15);">
    <div class="container">
      <h1 class="section-title mb-0">Tienda</h1>
    </div>
  </div>


  <!-- footer -->
  <footer class="footer-retro">
    <div class="container">
      <div class="row g-4">
        <div class="col-lg-4">
          <div class="footer-brand"><span>👾</span> Retro Games</div>
          <p class="footer-desc">La tienda online de videojuegos retro más completa de Argentina.</p>
        </div>
        <div class="col-6 col-lg-2 offset-lg-2">
          <div class="footer-heading">Secciones</div>
          <div class="footer-links">
            <a href="tienda.html">Tienda</a>
          </div>
        </div>
        <div class="col-6 col-lg-2">
          <div class="footer-heading">Géneros</div>
          <div class="footer-links">
            <a href="#">Acción</a>
            <a href="#">Deportes</a>
            <a href="#">Terror</a>
            <a href="#">Peleas</a>
          </div>
        </div>
      </div>
      <div class="footer-bottom">
        <span class="footer-copy">© 2025 <span>Retro Games</span>. Todos los derechos reservados.</span>
        <span>Hecho con 🎮 en Argentina</span>
      </div>
    </div>
  </footer>

  <!-- carrito en sidebar -->
  <div class="cart-overlay" id="cartOverlay">
    <div class="cart-sidebar">
      <div class="cart-header">
        <div class="cart-title">
          <span class="brand-icon">👾</span>
          <i class="bi bi-cart3 cart-icon"></i> Carrito
        </div>
        <button class="cart-close" id="closeCartBtn">&times;</button>
      </div>
      <div class="cart-items" id="cartItems"></div>
      <div class="cart-footer" id="cartFooter" style="display:none">
        <div class="cart-subtotal">
          <span class="subtotal-label">Subtotal</span>
          <span class="subtotal-amount" id="cartSubtotal">$ 0,00</span>
        </div>
        <div class="cart-actions">
          <button class="btn-retro btn-retro-dark" onclick=""><i class="bi bi-arrow-left"></i> Comprar más</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-retro" id="toastMsg">
    <span class="toast-icon">✅</span>
    <span id="toastText">Producto agregado</span>
  </div>

  <script>

  </script>
</body>
</html>
